<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAWN Online Compiler</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { background: #333; color: white; padding: 1rem; }
        main { display: flex; flex: 1; overflow: hidden; }
        #editor-container { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #ccc; }
        #output-container { flex: 1; display: flex; flex-direction: column; background: #f0f0f0; }
        textarea { flex: 1; resize: none; border: none; padding: 1rem; font-family: monospace; font-size: 14px; }
        #console { flex: 1; overflow-y: auto; padding: 1rem; font-family: monospace; background: #1e1e1e; color: #d4d4d4; white-space: pre-wrap; }
        .toolbar { padding: 0.5rem; background: #eee; border-bottom: 1px solid #ccc; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
        #download-link { margin-left: 1rem; display: none; }
    </style>
</head>
<body>
    <header>
        <h1>PAWN Online Compiler</h1>
    </header>
    <div class="toolbar">
        <button id="compile-btn" disabled>Loading Compiler...</button>
        <button id="load-btn">Load Script (.pwn)</button>
        <input type="file" id="file-input" accept=".pwn,.p,.inc" style="display: none;">
        <a id="download-link" href="#" download="script.amx">Download .amx</a>
    </div>
    <main>
        <div id="editor-container">
            <textarea id="editor" spellcheck="false">
main() {
    print("Hello, World!\n");
}
            </textarea>
        </div>
        <div id="output-container">
            <div id="console"></div>
        </div>
    </main>
    <script>
        // Define Module before loading the emscripten-generated JS
        var Module = {
            locateFile: function(path, prefix) {
                if (path.endsWith(".data") || path.endsWith(".wasm")) {
                    return "wasm/" + path;
                }
                return prefix + path;
            },
            preRun: [],
            postRun: [],
            print: (function() {
                return function(text) {
                    const consoleArea = document.getElementById('console');
                    if (consoleArea) {
                        consoleArea.textContent += text + '\n';
                        consoleArea.scrollTop = consoleArea.scrollHeight;
                    }
                };
            })(),
            printErr: function(text) {
                const consoleArea = document.getElementById('console');
                if (consoleArea) {
                    consoleArea.textContent += 'Error: ' + text + '\n';
                    consoleArea.scrollTop = consoleArea.scrollHeight;
                }
            },
            onRuntimeInitialized: function() {
                const consoleArea = document.getElementById('console');
                const compileBtn = document.getElementById('compile-btn');
                if (consoleArea) consoleArea.textContent += 'PAWN Compiler Ready.\n';
                if (compileBtn) {
                    compileBtn.disabled = false;
                    compileBtn.textContent = 'Compile';
                }
            }
        };
    </script>
    <script src="wasm/pawncc.js"></script>
    <script src="app.js"></script>
</body>
</html>
