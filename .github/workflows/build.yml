name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake nodejs

      - name: Compile Pawn Script
        run: |
          node scripts/compile_pawn.js

      - name: Fetch Pico SDK
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git
          cd pico-sdk
          git submodule update --init

      - name: Build Firmware
        run: |
          mkdir build
          cd build
          cmake ../src -DPICO_SDK_PATH=$GITHUB_WORKSPACE/pico-sdk
          make

      - name: Install Renode
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install --user robotframework
          # Install Renode
          wget https://github.com/renode/renode/releases/download/v1.15.3/renode_1.15.3_amd64.deb
          sudo apt-get install -y ./renode_1.15.3_amd64.deb
          rm renode_1.15.3_amd64.deb

      - name: Run Renode Tests
        run: |
          renode-test tests/pawn_test.robot

      - name: Upload UF2 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pawn_led_uf2
          path: build/pawn_led.uf2

  deploy-web:
    runs-on: ubuntu-latest
    needs: build-firmware
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
